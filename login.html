<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Hub - Leyline Authentication</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #151922;
            --text-color: #c5a880;
            --text-light: #fff;
            --accent-color: #45f3ff;
        }
        body { font-family: 'Georgia', serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: var(--panel-bg); border: 1px solid #2d3748; border-radius: 8px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--text-light); font-size: 1.8rem; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b0c10; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--accent-color); }
        .auth-btn { width: 100%; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 12px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 15px; }
        .auth-btn:hover { background: var(--accent-color); color: #000; }
        .switch-mode { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .switch-mode span { color: var(--text-color); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1 id="authTitle">Leyline Connection</h1>
        <form id="authForm">
            <div class="form-group">
                <label for="username">Mage Identity Tag</label>
                <input type="text" id="username" required placeholder="Unique signature string...">
            </div>
            <div class="form-group">
                <label for="password">Arcane Password Cipher</label>
                <input type="password" id="password" required placeholder="Keep it secret...">
            </div>
            <button type="submit" id="submitBtn" class="auth-btn">Establish Link</button>
        </form>
        <div class="switch-mode" id="switchContainer">
            New to the order? <span id="toggleMode">Forge New Core Account</span>
        </div>
    </div>

    <script>
        // YOUR EXCLUSIVE PRIVATE FIREBASE LINK
        const dbURL = "https://magic-system-78da8-default-rtdb.firebaseio.com/mages";
        let isSignUp = false;

        function setupToggleListener() {
            const toggleBtn = document.getElementById('toggleMode');
            if (toggleBtn) {
                toggleBtn.onclick = function() {
                    isSignUp = !isSignUp;
                    document.getElementById('authTitle').innerText = isSignUp ? "Forge New Core Account" : "Leyline Connection";
                    document.getElementById('submitBtn').innerText = isSignUp ? "Sign Up Signature" : "Establish Link";
                    document.getElementById('switchContainer').innerHTML = isSignUp ? 
                        `Already registered? <span id="toggleMode">Link Existing Core</span>` : 
                        `New to the order? <span id="toggleMode">Forge New Core Account</span>`;
                    setupToggleListener();
                };
            }
        }
        setupToggleListener();

        document.getElementById('authForm').onsubmit = async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            // 👑 THE MASTER OWNER KEY OVERRIDE
            if (user === "AdminOwner" && pass === "MasterKey2026") {
                const ownerSession = { username: "AdminOwner", rank: "Grandmaster", hasLicense: true, isOwner: true };
                sessionStorage.setItem('current_mage_session', JSON.stringify(ownerSession));
                await fetch(`${dbURL}/${user}.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ pass: "MasterKey2026", rank: "Grandmaster", power: 999999, hasLicense: true })
                });
                alert("👑 Master Owner status synced! Welcome back.");
                window.location.href = "index.html";
                return;
            }

            try {
                const response = await fetch(`${dbURL}/${user}.json`);
                const data = await response.json();

                if (isSignUp) {
                    if (data && data.pass) {
                        alert("❌ This identity tag is already taken globally!");
                        return;
                    }
                    await fetch(`${dbURL}/${user}.json`, {
                        method: 'PUT',
                        body: JSON.stringify({ pass: pass, rank: "Initiate", power: 0, hasLicense: false })
                    });
                    alert("✨ Profile forged online! Ready to login.");
                    window.location.reload();
                } else {
                    if (!data || data.pass !== pass) {
                        alert("❌ Incorrect cipher or account does not exist.");
                        return;
                    }
                    const userSession = { username: user, rank: data.rank, hasLicense: data.hasLicense };
                    sessionStorage.setItem('current_mage_session', JSON.stringify(userSession));
                    alert(`Welcome back, ${user}!`);
                    window.location.href = "index.html";
                }
            } catch (err) {
                alert("Leyline matrix connection timed out. Refresh and try again.");
            }
        };
    </script>
</body>
</html>
