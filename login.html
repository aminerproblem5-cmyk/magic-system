<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Hub - Leyline Authentication</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #151922;
            --text-color: #c5a880;
            --text-light: #fff;
            --accent-color: #45f3ff;
            --success-color: #2ed573;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: var(--panel-bg);
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
        }

        h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0b0c10;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .auth-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        .switch-mode {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .switch-mode span {
            color: var(--text-color);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1 id="authTitle">Leyline Connection</h1>
        
        <form id="authForm">
            <div class="form-group">
                <label for="username">Mage Identity Tag</label>
                <input type="text" id="username" required placeholder="Unique signature string...">
            </div>
            <div class="form-group">
                <label for="password">Arcane Password Cipher</label>
                <input type="password" id="password" required placeholder="Keep it secret...">
            </div>
            <button type="submit" id="submitBtn" class="auth-btn">Establish Link</button>
        </form>

        <div class="switch-mode" id="switchContainer">
            New to the order? <span id="toggleMode">Forge New Core Account</span>
        </div>
    </div>

    <script>
        let isSignUp = false;
        const toggleBtn = document.getElementById('toggleMode');
        const authTitle = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const switchContainer = document.getElementById('switchContainer');

        toggleBtn.addEventListener('click', () => {
            isSignUp = !isSignUp;
            authTitle.innerText = isSignUp ? "Forge New Core Account" : "Leyline Connection";
            submitBtn.innerText = isSignUp ? "Sign Up Signature" : "Establish Link";
            switchContainer.innerHTML = isSignUp ? 
                `Already registered? <span id="toggleMode">Link Existing Core</span>` : 
                `New to the order? <span id="toggleMode">Forge New Core Account</span>`;
            
            // Re-attach listener to dynamic element
            document.getElementById('toggleMode').addEventListener('click', arguments.callee);
        });

        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            // FETCH EXISTING DB ARRAYS
            let db = JSON.parse(localStorage.getItem('mage_users')) || {};

            // 👑 OWNER PRIVILEGE SHORT-CIRCUIT
            // If you log in with these exact hardcoded admin details, you inherit total control
            if (user === "AdminOwner" && pass === "MasterKey2026") {
                const ownerSession = {
                    username: "AdminOwner",
                    rank: "Grandmaster",
                    power: "Infinite",
                    hasLicense: true,
                    isOwner: true
                };
                sessionStorage.setItem('current_mage_session', JSON.stringify(ownerSession));
                
                // Ensure owner is locked cleanly in database records
                db["AdminOwner"] = { pass: "MasterKey2026", rank: "Grandmaster", power: 999999, hasLicense: true, isOwner: true };
                localStorage.setItem('mage_users', JSON.stringify(db));
                
                alert("Welcome back, Master Artisan. Infinite capability unlocked.");
                window.location.href = "index.html";
                return;
            }

            if (isSignUp) {
                if (db[user]) {
                    alert("This magical signature tag is already occupied by another corporeal presence!");
                    return;
                }
                
                // Create a standard base user account
                db[user] = {
                    pass: pass,
                    rank: "Initiate",
                    power: 0,
                    hasLicense: false,
                    isOwner: false
                };
                localStorage.setItem('mage_users', JSON.stringify(db));
                alert("Account signature successfully forged in local server cloud! Please sign in.");
                location.reload();
            } else {
                // LOGIN FLOW
                if (!db[user] || db[user].pass !== pass) {
                    alert("The Cipher failed. Credentials do not align with current leyline paths.");
                    return;
                }

                // Log user in securely for this tab lifecycle session
                const userSession = {
                    username: user,
                    rank: db[user].rank,
                    power: db[user].power,
                    hasLicense: db[user].hasLicense,
                    isOwner: db[user].isOwner
                };
                sessionStorage.setItem('current_mage_session', JSON.stringify(userSession));
                
                alert(`Welcome back, ${user}. Current Status: [Rank: ${db[user].rank}]`);
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
