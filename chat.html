<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arcanum Shared Crypt — Live Chat</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #151922;
            --text-color: #c5a880;
            --text-light: #fff;
            --accent-color: #45f3ff;
            --danger-color: #ff4d4d;
            --success-color: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(to bottom, #11141a, var(--bg-color)); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .user-panel { background: #1f2833; padding: 10px 20px; border-radius: 4px; border: 1px solid #333; color: #fff; font-size: 0.9rem; }
        .back-btn { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 5px 12px; cursor: pointer; border-radius: 3px; text-decoration: none; font-size: 0.9rem; }
        
        .chat-container { max-width: 1300px; width: 100%; margin: 25px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 25px; flex: 1; }
        @media (min-width: 900px) { .chat-container { grid-template-columns: 320px 1fr; } }
        
        .sidebar { background: var(--panel-bg); border: 1px solid #2d3748; border-radius: 6px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .main-chat-window { background: var(--panel-bg); border: 1px solid #2d3748; border-radius: 6px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; min-height: 550px; }
        
        h2 { color: var(--text-light); font-size: 1.1rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        
        .roster-list { list-style: none; overflow-y: auto; max-height: 400px; }
        .roster-item { padding: 10px; border-bottom: 1px solid #1a202c; border-radius: 4px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .roster-item:hover { background: rgba(69, 243, 255, 0.04); }
        .roster-item.active-chat { background: rgba(69, 243, 255, 0.1); border-left: 3px solid var(--accent-color); }
        
        /* Red Whisper Notification Dot */
        .whisper-identity-wrapper { display: inline-flex; align-items: center; gap: 8px; position: relative; }
        .chat-notification-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--danger-color);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--danger-color);
            animation: blink-dot 1.5s infinite;
        }
        @keyframes blink-dot {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .chat-feed { flex: 1; background: #07080c; border: 1px solid #1f2430; border-radius: 4px; padding: 15px; overflow-y: auto; height: 400px; margin-bottom: 15px; font-family: monospace; font-size: 0.9rem; }
        .chat-msg { margin-bottom: 10px; line-height: 1.4; color: #a4b0be; }
        .chat-msg strong { color: var(--text-light); }
        .chat-msg.system { color: var(--accent-color); font-style: italic; }
        .chat-msg.whisper { color: #d63031; background: rgba(214, 48, 49, 0.05); padding: 4px 8px; border-radius: 3px; border-left: 2px solid #d63031; }

        .input-row { display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #11141a; border: 1px solid #333; color: #fff; padding: 12px; font-family: monospace; border-radius: 4px; font-size: 0.95rem; }
        .send-btn { background: #233a42; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 0 25px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .send-btn:hover { background: var(--accent-color); color: #000; }
        
        .channel-indicator { padding: 4px 10px; background: #0b0c10; font-size: 0.8rem; border-radius: 3px; color: var(--text-color); margin-bottom: 15px; display: inline-block; border: 1px dashed #333; }
    </style>
</head>
<body>

    <header>
        <div>
            <a href="index.html" class="back-btn">&larr; Return to Nexus</a>
            <h1 style="color: #fff; font-size: 1.3rem; letter-spacing: 1px; display: inline-block; margin-left: 15px; vertical-align: middle;">Shared Arcanum Crypt</h1>
        </div>
        <div class="user-panel" id="userPanel">Syncing links...</div>
    </header>

    <div class="chat-container">
        
        <div class="sidebar">
            <div>
                <h2>Global Rooms</h2>
                <ul class="roster-list">
                    <li class="roster-item active-chat" id="globalRoomBtn" onclick="selectGlobalChannel()">
                        <strong>🌐 Main Chamber Feed</strong>
                    </li>
                </ul>
            </div>
            <div>
                <h2>Private Whispers</h2>
                <ul class="roster-list" id="privateRosterList">
                    </ul>
            </div>
        </div>

        <div class="main-chat-window">
            <div>
                <h2 id="chatWindowTitle">Chamber Communications Hub</h2>
                <div class="channel-indicator" id="channelViewIndicator">Active Mode: Global Broadcast Channel</div>
                <div class="chat-feed" id="chatFeedBox">Synchronizing ley lines...</div>
            </div>
            
            <div class="input-row">
                <input type="text" id="chatInputField" class="chat-input" placeholder="Inscribe your transmission block here...">
                <button id="chatSendButton" class="send-btn">Send</button>
            </div>
        </div>

    </div>

    <script>
        const dbURL = "https://magic-system-78da8-default-rtdb.firebaseio.com/mages";
        const chatDbURL = "https://magic-system-78da8-default-rtdb.firebaseio.com/chat";
        
        let session = JSON.parse(sessionStorage.getItem('current_mage_session'));
        let activePrivateTarget = null; // null means global main chamber
        let globalMagesCache = {};

        // Security Vault Protection Intercept
        if (!session) {
            alert("No active session core detected. Diverting to Vault Gate.");
            window.location.href = "login.html";
        } else {
            document.getElementById('userPanel').innerHTML = `Identity: <strong>${session.username}</strong>`;
        }

        async function syncChatSystem() {
            try {
                // 1. Sync User Directory & Whisper flags
                const magesRes = await fetch(`${dbURL}.json`);
                globalMagesCache = await magesRes.json() || {};
                renderPrivateWhisperSidebar(globalMagesCache);

                // 2. Sync Messaging Data Blocks
                if (activePrivateTarget === null) {
                    const globalRes = await fetch(`${chatDbURL}/global.json`);
                    const globalMsgs = await globalRes.json() || {};
                    renderChatFeed(globalMsgs, false);
                } else {
                    const whisperKey = generateWhisperKey(session.username, activePrivateTarget);
                    const privateRes = await fetch(`${chatDbURL}/whispers/${whisperKey}.json`);
                    const privateMsgs = await privateRes.json() || {};
                    renderChatFeed(privateMsgs, true);
                }
            } catch (err) {
                console.error("Crypt link dropped momentarily...", err);
            }
        }

        function generateWhisperKey(userA, userB) {
            return [userA, userB].sort().join("_").replace(/\s+/g, '-');
        }

        function renderPrivateWhisperSidebar(networkUsers) {
            const container = document.getElementById('privateRosterList');
            if (!container) return;
            container.innerHTML = '';

            const myData = networkUsers[session.username] || {};
            // Pull unread states tracked under /unreadPrivate/
            const myUnreadMap = myData.unreadPrivate || {};

            Object.keys(networkUsers).forEach(username => {
                if (username === session.username) return; // Skip self

                const isTargetSelected = (activePrivateTarget === username);
                const hasUnreadDot = myUnreadMap[username] === true;

                const li = document.createElement('li');
                li.className = `roster-item ${isTargetSelected ? 'active-chat' : ''}`;
                li.onclick = () => selectPrivateTarget(username);

                li.innerHTML = `
                    <div class="whisper-identity-wrapper">
                        <strong>👤 ${username}</strong>
                        ${(hasUnreadDot && !isTargetSelected) ? '<span class="chat-notification-dot"></span>' : ''}
                    </div>
                `;
                container.appendChild(li);
            });
        }

        function selectGlobalChannel() {
            activePrivateTarget = null;
            document.getElementById('globalRoomBtn').classList.add('active-chat');
            document.getElementById('chatWindowTitle').innerText = "Chamber Communications Hub";
            document.getElementById('channelViewIndicator').innerText = "Active Mode: Global Broadcast Channel";
            syncChatSystem();
        }

        async function selectPrivateTarget(username) {
            activePrivateTarget = username;
            document.getElementById('globalRoomBtn').classList.remove('active-chat');
            document.getElementById('chatWindowTitle').innerText = `Whisper Crypt: ${username}`;
            document.getElementById('channelViewIndicator').innerText = `Active Mode: Encrypted Private Sync Point`;

            // Clear database unread notification dot for this contact
            await fetch(`${dbURL}/${session.username}/unreadPrivate/${username}.json`, {
                method: 'PUT',
                body: JSON.stringify(false)
            });

            syncChatSystem();
        }

        function renderChatFeed(msgObject, isWhisperMode) {
            const feedBox = document.getElementById('chatFeedBox');
            feedBox.innerHTML = '';

            const items = Object.values(msgObject);
            if (items.length === 0) {
                feedBox.innerHTML = `<div class="chat-msg system">No transmissions captured within this terminal node.</div>`;
                return;
            }

            items.sort((a,b) => a.timestamp - b.timestamp);

            items.forEach(msg => {
                const div = document.createElement('div');
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                if (isWhisperMode) {
                    div.className = "chat-msg whisper";
                    div.innerHTML = `<span>[${timeStr}]</span> <strong>${msg.sender} &rarr; ${msg.receiver}:</strong> ${msg.text}`;
                } else {
                    div.className = "chat-msg";
                    div.innerHTML = `<span>[${timeStr}]</span> <strong>${msg.sender}:</strong> ${msg.text}`;
                }
                feedBox.appendChild(div);
            });
            feedBox.scrollTop = feedBox.scrollHeight;
        }

        async function dispatchMessage() {
            const inputField = document.getElementById('chatInputField');
            const messageText = inputField.value.trim();
            if (!messageText) return;

            inputField.value = '';

            const payload = {
                sender: session.username,
                text: messageText,
                timestamp: Date.now()
            };

            if (activePrivateTarget === null) {
                // Send to global feed
                await fetch(`${chatDbURL}/global.json`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
            } else {
                // Send to private feed channel
                payload.receiver = activePrivateTarget;
                const whisperKey = generateWhisperKey(session.username, activePrivateTarget);
                
                await fetch(`${chatDbURL}/whispers/${whisperKey}.json`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                // Flag recipient's node with an unread private message indicator
                await fetch(`${dbURL}/${activePrivateTarget}/unreadPrivate/${session.username}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(true)
                });
            }

            syncChatSystem();
        }

        // Action Bindings
        document.getElementById('chatSendButton').onclick = dispatchMessage;
        document.getElementById('chatInputField').onkeydown = (e) => { if (e.key === 'Enter') dispatchMessage(); };

        // Polling loop
        syncChatSystem();
        setInterval(syncChatSystem, 3000);
    </script>
</body>
</html>
