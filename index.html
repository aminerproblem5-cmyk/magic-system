<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Hub - Mage Leaderboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --text-color: #c5a880;
            --text-light: #fff;
            --accent-color: #45f3ff;
            --success-color: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle, #1a233a 0%, #0b0c10 100%);
            border-bottom: 2px solid #222;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: var(--text-light);
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(69, 243, 255, 0.2);
        }

        .hero p {
            font-size: 1.2rem;
            font-style: italic;
            color: #888;
            max-width: 700px;
            margin: 0 auto;
        }

        .main-content {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        @media (min-width: 850px) {
            .main-content {
                grid-template-columns: 1.2fr 1fr;
            }
            .intro-box { grid-column: span 2; }
        }

        .intro-box {
            background-color: var(--panel-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
        }

        .intro-box h2 {
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .portal-btn {
            display: inline-block;
            background: transparent;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 35px;
            border: 2px solid var(--text-color);
            border-radius: 4px;
            transition: all 0.4s ease;
            margin-top: 15px;
        }

        .portal-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .panel {
            background: #151922;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 25px;
        }

        .panel h2 {
            color: var(--text-light);
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #888;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0b0c10;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--success-color);
            color: var(--success-color);
            padding: 12px;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--success-color);
            color: #000;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .leaderboard-table th {
            color: #888;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 10px;
            border-bottom: 2px solid #333;
        }

        .leaderboard-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #222;
            color: #e2e8f0;
        }

        .rank-num {
            font-weight: bold;
            color: var(--accent-color);
        }

        .mancy-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #000;
        }

        .badge-pyro { background-color: #ff4d4d; }
        .badge-aero { background-color: #4da6ff; }
        .badge-necro { background-color: #9933ff; color: #fff; }
        .badge-geo { background-color: #ffaa00; }
        .badge-hydro { background-color: #00ffcc; }

        .score-val {
            font-family: monospace;
            font-weight: bold;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>The Grand Arcanum</h1>
        <p>Register your magical signature and claim your rank instantly.</p>
    </header>

    <div class="main-content">
        <div class="intro-box">
            <h2>Welcome, Initiate</h2>
            <p>Reality is governed by the elements. Create a Focus Slate below to test your power capacity.</p>
            <a href="codex.html" class="portal-btn">Open the Element Codex</a>
        </div>

        <!-- Left: Form -->
        <div class="panel">
            <h2>Forge Your Slate</h2>
            <form id="mageForm">
                <div class="form-group">
                    <label for="mageName">Mage Name / Alias</label>
                    <input type="text" id="mageName" placeholder="e.g., Ignis the Bold" required>
                </div>
                <div class="form-group">
                    <label for="chosenMancy">Primary Alignment</label>
                    <select id="chosenMancy" required>
                        <option value="Pyromancy">Pyromancy</option>
                        <option value="Aeromancy">Aeromancy</option>
                        <option value="Necromancy">Necromancy</option>
                        <option value="Geomancy">Geomancy</option>
                        <option value="Hydromancy">Hydromancy</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="slateQuality">Slate Composition</label>
                    <select id="slateQuality" required>
                        <option value="10">Crude Obsidian Stone (Basic)</option>
                        <option value="25">Refined Granite Slab (Adeptic)</option>
                        <option value="50">Flawless Quartz Crystal (Masterpiece)</option>
                        <option value="100">Prismatic Meteorite Core (Legendary)</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Calculate Power & Rank</button>
            </form>
        </div>

        <!-- Right: Board -->
        <div class="panel">
            <h2>Global Order of Mages</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Alignment</th>
                        <th>Power</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Set up pre-loaded mythical figures so the leaderboard looks awesome immediately
        const defaultMages = [
            {mage_name: "Archmage Malakor", chosen_mancy: "Necromancy", power_score: 850},
            {mage_name: "Zephyr Storm", chosen_mancy: "Aeromancy", power_score: 620},
            {mage_name: "Ember Flint", chosen_mancy: "Pyromancy", power_score: 210}
        ];

        // Load existing scoreboard array or install the defaults
        function getLeaderboard() {
            const stored = localStorage.getItem('mage_scores');
            if (!stored) {
                localStorage.setItem('mage_scores', JSON.stringify(defaultMages));
                return defaultMages;
            }
            return JSON.parse(stored);
        }

        function getBadgeClass(mancy) {
            if(mancy === "Pyromancy") return "badge-pyro";
            if(mancy === "Aeromancy") return "badge-aero";
            if(mancy === "Necromancy") return "badge-necro";
            if(mancy === "Geomancy") return "badge-geo";
            if(mancy === "Hydromancy") return "badge-hydro";
            return "";
        }

        function updateBoardDisplay() {
            const mages = getLeaderboard();
            // Sort from highest power level down to lowest
            mages.sort((a, b) => b.power_score - a.power_score);
            
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            
            mages.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank-num">#${index + 1}</td>
                    <td>${escapeHTML(row.mage_name)}</td>
                    <td><span class="mancy-badge ${getBadgeClass(row.chosen_mancy)}">${row.chosen_mancy}</span></td>
                    <td class="score-val">${row.power_score} MP</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('mageForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('mageName').value.trim();
            const mancy = document.getElementById('chosenMancy').value;
            const multiplier = parseInt(document.getElementById('slateQuality').value);
            
            // Generate a random power factor based on their selections
            const basePower = Math.floor(Math.random() * 8) + 4;
            const totalPower = basePower * multiplier;

            const currentScores = getLeaderboard();
            currentScores.push({ mage_name: name, chosen_mancy: mancy, power_score: totalPower });
            
            localStorage.setItem('mage_scores', JSON.stringify(currentScores));
            
            document.getElementById('mageName').value = '';
            updateBoardDisplay();
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }

        // Boot display up instantly
        updateBoardDisplay();
    </script>
</body>
</html>
