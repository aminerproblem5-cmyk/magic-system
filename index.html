<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Arcanum Gates - Mainframe Access Terminal</title>
    <style>
        /* ==========================================================================
           1. CORE VARIABLE DICTIONARY & DESIGN SYSTEM
           ========================================================================== */
        :root {
            --bg-deep-core: #07080c;
            --bg-main-matrix: #0b0c10;
            --bg-panel-surface: #151922;
            --bg-panel-elevated: #1f2430;
            --border-matrix-dim: #1f2937;
            --border-matrix-glow: #2d3748;
            
            --text-primary-gold: #c5a880;
            --text-high-bright: #ffffff;
            --text-muted-gray: #a4b0be;
            --text-dark-shadow: #4f5d73;
            
            --neon-cyan-active: #45f3ff;
            --neon-cyan-glow: rgba(69, 243, 255, 0.25);
            --neon-green-success: #2ed573;
            --neon-green-glow: rgba(46, 213, 115, 0.25);
            --neon-red-failure: #ff4d4d;
            --neon-red-glow: rgba(255, 77, 77, 0.25);
            --neon-gold-legend: #f1c40f;
            --neon-gold-glow: rgba(241, 196, 15, 0.25);
            
            --fx-transition-fast: 0.15s ease;
            --fx-transition-std: 0.3s ease;
            --fx-matrix-glow: 0 0 15px rgba(69, 243, 255, 0.15);
        }

        /* ==========================================================================
           2. RESET ENGINE & LAYOUT SKELETON
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-matrix-glow) var(--bg-deep-core);
        }

        *::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        *::-webkit-scrollbar-track {
            background: var(--bg-deep-core);
        }
        *::-webkit-scrollbar-thumb {
            background-color: var(--border-matrix-glow);
            border-radius: 3px;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-main-matrix);
            color: var(--text-primary-gold);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* ==========================================================================
           3. BACKGROUND AMBIENCE & MATRIX LAYER COMPONENT SPECS
           ========================================================================== */
        .matrix-ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: 
                radial-gradient(circle at 10% 20%, rgba(69, 243, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(241, 196, 15, 0.02) 0%, transparent 45%);
            opacity: 0.85;
        }

        .matrix-grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.005) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ==========================================================================
           4. GLOBAL CONTAINER ARCHITECTURE
           ========================================================================== */
        .mainframe-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex-grow: 1;
        }

        /* ==========================================================================
           5. APP HEADER & SYSTEM BANNER COMPONENTS
           ========================================================================== */
        .system-banner {
            background: var(--bg-panel-surface);
            border: 1px solid var(--border-matrix-glow);
            border-radius: 8px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: var(--fx-matrix-glow);
            position: relative;
            overflow: hidden;
        }

        .system-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan-active), var(--neon-gold-legend), var(--neon-green-success));
        }

        .banner-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .banner-title-block h1 {
            color: var(--text-high-bright);
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .banner-title-block p {
            color: var(--text-muted-gray);
            font-size: 0.95rem;
            margin-top: 4px;
            font-style: italic;
        }

        .system-diagnostic-badges {
            display: flex;
            gap: 12px;
            font-family: monospace;
            font-size: 0.75rem;
        }

        .badge {
            background: var(--bg-deep-core);
            border: 1px solid var(--border-matrix-dim);
            padding: 6px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-green-success);
            box-shadow: 0 0 8px var(--neon-green-success);
        }

        .badge .indicator.pulse {
            animation: badgePulse 2s infinite alternate;
        }

        /* ==========================================================================
           6. MAIN WORKSPACE SUB-GRID SYSTEM (DASHBOARD SPLIT)
           ========================================================================== */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 992px) {
            .workspace-grid {
                grid-template-columns: 320px 1fr;
            }
        }

        /* ==========================================================================
           7. SIDEBAR SYSTEM CONTROL MODULES
           ========================================================================== */
        .control-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-widget {
            background: var(--bg-panel-surface);
            border: 1px solid var(--border-matrix-glow);
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .widget-title {
            color: var(--text-high-bright);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-matrix-dim);
            padding-bottom: 8px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .widget-title span.accent {
            color: var(--neon-cyan-active);
        }

        /* Authentication System Profiles UI */
        .identity-auth-matrix {
            background: var(--bg-deep-core);
            border: 1px solid var(--border-matrix-dim);
            border-radius: 4px;
            padding: 16px;
        }

        .input-structure {
            margin-bottom: 14px;
        }

        .input-structure label {
            display: block;
            font-family: monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted-gray);
            margin-bottom: 6px;
        }

        .input-structure input[type="text"] {
            width: 100%;
            padding: 10px;
            background: var(--bg-main-matrix);
            border: 1px solid var(--border-matrix-dim);
            color: var(--text-high-bright);
            font-family: monospace;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: border-color var(--fx-transition-fast);
        }

        .input-structure input[type="text"]:focus {
            border-color: var(--neon-cyan-active);
            outline: none;
        }

        .action-trigger-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-cyan-active);
            color: var(--neon-cyan-active);
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--fx-transition-fast);
        }

        .action-trigger-btn:hover {
            background: rgba(69, 243, 255, 0.05);
            box-shadow: 0 0 10px var(--neon-cyan-glow);
        }

        /* Profile Established Verification View */
        .identity-profile-active {
            display: none;
            background: var(--bg-deep-core);
            border: 1px solid var(--neon-green-success);
            border-radius: 4px;
            padding: 16px;
            position: relative;
        }

        .profile-badge-title {
            color: var(--text-high-bright);
            font-size: 1.1rem;
            font-weight: bold;
            word-break: break-all;
            padding-right: 40px;
        }

        .profile-meta-details {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-muted-gray);
            margin-top: 8px;
            line-height: 1.4;
        }

        .disconnect-trigger {
            position: absolute;
            top: 14px;
            right: 14px;
            background: transparent;
            border: 1px solid var(--neon-red-failure);
            color: var(--neon-red-failure);
            font-size: 0.7rem;
            font-family: monospace;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .disconnect-trigger:hover {
            background: var(--neon-red-failure);
            color: var(--bg-deep-core);
        }

        /* System Metrics List Widget */
        .system-metrics-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed var(--border-matrix-dim);
        }

        .metric-row span:last-child {
            color: var(--text-high-bright);
        }

        /* Security Integrity Checklist Panel */
        .integrity-checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .integrity-node {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-muted-gray);
        }

        .integrity-node input[type="checkbox"] {
            margin-top: 2px;
            accent-color: var(--neon-cyan-active);
        }

        /* ==========================================================================
           8. PORTAL GRID MATRIX ARCHITECTURE (MAIN CONTENT)
           ========================================================================== */
        .main-portal-hub {
            background: var(--bg-panel-surface);
            border: 1px solid var(--border-matrix-glow);
            border-radius: 6px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hub-title-block h2 {
            color: var(--text-high-bright);
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .hub-title-block p {
            font-size: 0.9rem;
            color: var(--text-muted-gray);
            margin-top: 4px;
        }

        .portal-gateways-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 576px) {
            .portal-gateways-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .gateway-card {
            background: var(--bg-deep-core);
            border: 1px solid var(--border-matrix-dim);
            border-radius: 6px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-decoration: none;
            color: inherit;
            transition: transform var(--fx-transition-fast), border-color var(--fx-transition-fast), box-shadow var(--fx-transition-fast);
            position: relative;
            overflow: hidden;
        }

        .gateway-card::after {
            content: '→';
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 1.5rem;
            opacity: 0.3;
            transition: transform var(--fx-transition-std), opacity var(--fx-transition-std);
            font-family: monospace;
        }

        .gateway-card:hover {
            transform: translateY(-2px);
        }

        .gateway-card:hover::after {
            opacity: 1;
            transform: translateX(5px);
        }

        /* Specific Link Variants and Theme Wrappers */
        .variant-vault {
            border-left: 4px solid var(--neon-green-success);
        }
        .variant-vault:hover {
            border-color: var(--neon-green-success);
            box-shadow: 0 0 15px var(--neon-green-glow);
        }
        .variant-vault .card-icon {
            color: var(--neon-green-success);
        }

        .variant-matrix {
            border-left: 4px solid var(--neon-gold-legend);
        }
        .variant-matrix:hover {
            border-color: var(--neon-gold-legend);
            box-shadow: 0 0 15px var(--neon-gold-glow);
        }
        .variant-matrix .card-icon {
            color: var(--neon-gold-legend);
        }

        .card-icon {
            font-size: 2.5rem;
            line-height: 1;
        }

        .card-meta h3 {
            color: var(--text-high-bright);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: monospace;
            margin-bottom: 6px;
        }

        .card-meta p {
            font-size: 0.85rem;
            color: var(--text-muted-gray);
            line-height: 1.5;
        }

        /* Information Alert Callouts */
        .information-notice-box {
            background: rgba(69, 243, 255, 0.02);
            border: 1px dashed var(--border-matrix-glow);
            padding: 15px;
            border-radius:
