<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Video Vault Terminal</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #151922;
            --text-color: #c5a880;
            --text-light: #fff;
            --accent-color: #2ed573; /* Match the green vault link */
            --danger-color: #ff4d4d;
            --cyan-color: #45f3ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; padding: 40px 20px; }
        
        .vault-container { max-width: 900px; width: 100%; margin: 0 auto; }
        .panel { background: var(--panel-bg); border: 1px solid #2d3748; border-radius: 6px; padding: 25px; margin-bottom: 25px; }
        h1, h2 { color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        h1 { font-size: 1.6rem; border-bottom: 2px solid #222; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        .back-btn { background: transparent; border: 1px solid var(--cyan-color); color: var(--cyan-color); padding: 8px 16px; font-size: 0.9rem; text-decoration: none; border-radius: 4px; font-weight: bold; text-transform: uppercase;}
        .back-btn:hover { background: rgba(69, 243, 255, 0.05); }

        /* File Upload Drop Zone Styles */
        .drop-zone { border: 2px dashed #2ed573; border-radius: 6px; background: rgba(46, 213, 115, 0.02); padding: 40px 20px; text-align: center; cursor: pointer; transition: background 0.3s ease; }
        .drop-zone.drag-over { background: rgba(46, 213, 115, 0.1); border-color: var(--text-light); }
        .drop-zone p { font-size: 1.1rem; color: #a4b0be; margin-bottom: 10px; }
        .drop-zone span { font-size: 0.85rem; color: #666; font-family: monospace; }
        #fileInput { display: none; }

        /* Media Grid Display */
        .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 15px; }
        .vault-card { background: #07080c; border: 1px solid #1f2430; border-radius: 4px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .vault-card video, .vault-card img { width: 100%; height: auto; border-radius: 3px; background: #000; border: 1px solid #222; }
        .file-info { font-family: monospace; font-size: 0.85rem; color: #a4b0be; word-break: break-all; }
        .file-meta { font-size: 0.75rem; color: #555; display: flex; justify-content: space-between; }
        
        .status-msg { color: var(--cyan-color); font-family: monospace; font-size: 0.9rem; margin-top: 10px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>

    <div class="vault-container">
        <div class="panel">
            <h1>
                <span>🎬 Grand Arcanum Video Vault</span>
                <a href="index.html" class="back-btn">← Return to Gates</a>
            </h1>
            <p style="color: #a4b0be; margin-top: 5px;">Secure repository matrix module. Transmit and review localized record logs here.</p>
        </div>

        <div class="panel">
            <h2>File Ingestion Terminal</h2>
            <label for="fileInput" class="drop-zone" id="dropZone">
                <p>Drag & Drop Record File Here or Click to Browse</p>
                <span>Accepts video configurations, image footprints, or data elements</span>
                <input type="file" id="fileInput" accept="video/*,image/*">
            </label>
            <div class="status-msg" id="statusMessage">System Idle. Awaiting ingestion sequence...</div>
        </div>

        <div class="panel">
            <h2>Archived Matrix Files</h2>
            <div class="vault-grid" id="vaultGrid">
                <div class="vault-card">
                    <div style="height: 130px; display:flex; align-items:center; justify-content:center; background:#111; color:#333; font-size:3rem; border-radius:3px;">🎬</div>
                    <div class="file-info"><strong>sample_council_record.mp4</strong></div>
                    <div class="file-meta"><span>Size: 4.2 MB</span><span>Uploaded: System</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusMessage = document.getElementById('statusMessage');
        const vaultGrid = document.getElementById('vaultGrid');

        // Prevent standard system window default actions on drags
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drag toggles
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
        });

        // Capture dropped files
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleUploadedFiles(files);
        });

        // Capture clicked selection
        fileInput.addEventListener('change', function() {
            handleUploadedFiles(this.files);
        });

        function handleUploadedFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            
            statusMessage.innerText = `Ingesting: "${file.name}"... Processing bits.`;
            statusMessage.style.color = 'var(--cyan-color)';

            const reader = new FileReader();
            
            // Read file chunk data into format base string to store or preview
            reader.onload = function(e) {
                const fileDataUrl = e.target.result;
                displayNewArchiveCard(file.name, file.size, file.type, fileDataUrl);
                
                statusMessage.innerText = `Success: Archive block written for "${file.name}".`;
                statusMessage.style.color = 'var(--accent-color)';
                
                /* OPTIONAL FIREBASE LINKAGE:
                   If you want to sync this to your real database table under a path like "/vault", 
                   you can add code here to fetch/push the data to your URL:
                   
                   fetch('https://magic-system-78da8-default-rtdb.firebaseio.com/vault.json', {
                       method: 'POST',
                       body: JSON.stringify({ name: file.name, data: fileDataUrl, timestamp: Date.now() })
                   });
                */
            };

            reader.onerror = function() {
                statusMessage.innerText = `Critical Core Error: Could not parse document elements.`;
                statusMessage.style.color = 'var(--danger-color)';
            };

            // Read the binary file directly into local URL for injection strings
            reader.readAsDataURL(file);
        }

        function displayNewArchiveCard(name, size, type, dataUrl) {
            const card = document.createElement('div');
            card.className = 'vault-card';
            
            let previewElement = `<div style="height: 130px; display:flex; align-items:center; justify-content:center; background:#111; color:#444; font-size:3rem; border-radius:3px;">📁</div>`;
            
            // Generate visual markup matching type rules
            if (type.startsWith('video/')) {
                previewElement = `<video src="${dataUrl}" controls></video>`;
            } else if (type.startsWith('image/')) {
                previewElement = `<img src="${dataUrl}" alt="Preview Asset">`;
            }

            const sizeFormatted = (size / (1024 * 1024)).toFixed(2) + ' MB';

            card.innerHTML = `
                ${previewElement}
                <div class="file-info"><strong>${name}</strong></div>
                <div class="file-meta"><span>Size: ${sizeFormatted}</span><span>Uploaded: Just Now</span></div>
            `;
            
            // Insert newest items directly at the head of the grid box line
            vaultGrid.insertBefore(card, vaultGrid.firstChild);
        }
    </script>
</body>
</html>
